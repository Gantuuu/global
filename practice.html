<!DOCTYPE html>
<html lang="ko">
<head>
<script>document.documentElement.classList.add('js');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="doc.practice">소송업무 · 업무분야 — 글로벌 법률사무소</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/site.css">
</head>
<body data-page="practice">

<header id="site-head"></header>

<!-- ════ PAGE HERO ════ -->
<section class="phero" data-screen-label="업무분야 히어로">
  <div class="hero-bg" aria-hidden="true"><div class="hero-grid"></div><div class="hero-glow"></div></div>
  <div class="wrap" style="position:relative;z-index:2;">
    <div class="crumb"><span class="gold" data-i18n="brand.name"></span> / <span data-i18n="practice.crumb"></span></div>
    <h1 class="display" data-i18n="practice.title"></h1>
    <p class="lead" data-i18n="practice.lead"></p>
  </div>
</section>

<!-- ════ PRACTICE AREAS ════ -->
<section class="section section--tight" data-screen-label="업무 분야">
  <div class="wrap">
    <div class="sec-head"><div class="l"><span class="eyebrow" data-i18n="practice.areas.title"></span></div></div>
    <div class="areas">
      <div class="area reveal"><span class="idx">01</span>
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 3 2.5 15 0 18M12 3c-2.5 3-2.5 15 0 18"/></svg>
        <h3 data-i18n="area.intl.name"></h3><p data-i18n="area.intl.desc"></p></div>
      <div class="area reveal" data-d="1"><span class="idx">02</span>
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V6l8-3 8 3v15"/><path d="M4 21h16M9 9h0M15 9h0M9 13h0M15 13h0M9 17h0M15 17h0"/></svg>
        <h3 data-i18n="area.corp.name"></h3><p data-i18n="area.corp.desc"></p></div>
      <div class="area reveal" data-d="2"><span class="idx">03</span>
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M5 7l7-3 7 3M5 7l-2 6a4 4 0 008 0L5 7m14 0l-2 6a4 4 0 008 0l-2-6M8 21h8"/></svg>
        <h3 data-i18n="area.criminal.name"></h3><p data-i18n="area.criminal.desc"></p></div>
      <div class="area reveal" data-d="3"><span class="idx">04</span>
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V8z"/><path d="M14 3v5h5M9 13h6M9 17h6"/></svg>
        <h3 data-i18n="area.civil.name"></h3><p data-i18n="area.civil.desc"></p></div>
      <div class="area reveal"><span class="idx">05</span>
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2"/><circle cx="12" cy="9" r="2.4"/><path d="M9 15h6"/></svg>
        <h3 data-i18n="area.immigration.name"></h3><p data-i18n="area.immigration.desc"></p></div>
      <div class="area reveal" data-d="1"><span class="idx">06</span>
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7M5 10v10h14V10M10 20v-6h4v6"/></svg>
        <h3 data-i18n="area.realestate.name"></h3><p data-i18n="area.realestate.desc"></p></div>
      <div class="area reveal" data-d="2"><span class="idx">07</span>
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 00-4 12.7c.6.5 1 1.3 1 2.1h6c0-.8.4-1.6 1-2.1A7 7 0 0012 2z"/></svg>
        <h3 data-i18n="area.ip.name"></h3><p data-i18n="area.ip.desc"></p></div>
      <div class="area reveal" data-d="3"><span class="idx">08</span>
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6M16 5.5a3 3 0 010 5.5M21 20c0-2.5-1.3-4.5-3.5-5.5"/></svg>
        <h3 data-i18n="area.labor.name"></h3><p data-i18n="area.labor.desc"></p></div>
    </div>
  </div>
</section>

<!-- ════ LITIGATION ════ -->
<section class="section" data-screen-label="소송업무">
  <div class="wrap">
    <div class="split" style="align-items:flex-start;">
      <div class="reveal" style="position:sticky;top:110px;">
        <span class="eyebrow" data-i18n="practice.litigation.eyebrow"></span>
        <h2 class="h2" style="margin-top:22px;" data-i18n="practice.litigation.title"></h2>
        <p class="lead" style="margin-top:22px;" data-i18n="practice.litigation.desc"></p>
        <a class="txtlink" href="contact.html" style="margin-top:30px;">
          <span data-i18n="btn.consult"></span>
          <svg class="arr" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </a>
      </div>
      <div class="vlist reveal" data-d="1">
        <div class="vrow"><span class="n">01</span><div><h3 data-i18n="lit.civil.t"></h3><p data-i18n="lit.civil.d"></p></div></div>
        <div class="vrow"><span class="n">02</span><div><h3 data-i18n="lit.criminal.t"></h3><p data-i18n="lit.criminal.d"></p></div></div>
        <div class="vrow"><span class="n">03</span><div><h3 data-i18n="lit.admin.t"></h3><p data-i18n="lit.admin.d"></p></div></div>
        <div class="vrow"><span class="n">04</span><div><h3 data-i18n="lit.family.t"></h3><p data-i18n="lit.family.d"></p></div></div>
        <div class="vrow"><span class="n">05</span><div><h3 data-i18n="lit.arbit.t"></h3><p data-i18n="lit.arbit.d"></p></div></div>
      </div>
    </div>
  </div>
</section>

<!-- ════ CTA ════ -->
<section class="section section--tight" data-screen-label="CTA">
  <div class="wrap">
    <div class="cta-band reveal">
      <div class="glow"></div>
      <h2 class="h1" data-i18n="home.cta.title"></h2>
      <p class="lead" data-i18n="home.cta.desc"></p>
      <div class="btns">
        <a class="btn btn--gold btn--lg" href="contact.html" data-i18n="btn.consult"></a>
        <a class="btn btn--ghost btn--lg" href="resources.html" data-i18n="nav.resources"></a>
      </div>
    </div>
  </div>
</section>

<footer id="site-foot"></footer>

<script src="js/i18n.js"></script>
<script src="js/site.js"></script>
</body>
</html>
