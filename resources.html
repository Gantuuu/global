<script>
/* demo: generate a placeholder file on download click */
document.addEventListener("click", function(e){
  var a = e.target.closest("[data-file]");
  if(!a) return;
  e.preventDefault();
  var titleEl = a.closest("tr").querySelector(".ttl");
  var name = (titleEl ? titleEl.textContent : "form").trim();
  var body = name + "\n\n— 글로벌 법률사무소 (Global Law Office)\n"
    + "본 파일은 데모용 견본입니다. 실제 서식은 상담 시 제공됩니다.\n02 2277 2442 · lawsqare@naver.com";
  var blob = new Blob([body], { type:"text/plain;charset=utf-8" });
  var url = URL.createObjectURL(blob);
  var link = document.createElement("a");
  link.href = url; link.download = name + ".txt";
  document.body.appendChild(link); link.click(); link.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
});
</script>
